<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEM PENGURUSAN IDENTITI PEGAWAI SPOA</title>

<style>
body{font-family:'Segoe UI';margin:0;background:#f1f5f9;}
header{
background:#392f48;color:white;padding:15px;
display:flex;align-items:center;gap:10px;
border-bottom:4px solid #c3a244;
}
header img{height:40px;}

.container{padding:20px;}
.card{
background:white;padding:20px;border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
margin-top:10px;
}

input,textarea{
width:100%;padding:12px;margin:8px 0;
border-radius:8px;border:1px solid #ccc;
}

button{
padding:12px;background:#392f48;color:white;
border:none;border-radius:8px;width:100%;
}

.nav{display:flex;gap:10px;margin-bottom:15px;}
.nav button{flex:1;}

.hidden{display:none;}

.profile-img{
width:120px;height:120px;border-radius:50%;
object-fit:cover;border:3px solid #c3a244;
display:block;margin:auto;
}
</style>
</head>

<body>

<header>
<img src="logospoa.png">
<h2>SISTEM PENGURUSAN IDENTITI PEGAWAI SPOA</h2>
</header>

<!-- LOGIN -->
<div id="loginPage" class="container">
<div class="card">
<h2>Selamat Datang</h2>
<input id="username" placeholder="Username">
<input id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- MAIN -->
<div id="mainPage" class="container hidden">

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('news')">News</button>
<button id="adminBtn" class="hidden" onclick="show('admin')">Admin</button>
<button onclick="logout()">Logout</button>
</div>

<div id="home" class="card"></div>

<div id="news" class="card hidden">
<h2>Pengumuman</h2>
<div id="newsList"></div>
</div>

<div id="admin" class="card hidden">
<h2>Admin Panel</h2>

<h3>Tambah News</h3>
<textarea id="newsText"></textarea>
<input type="file" id="newsImg">
<button onclick="addNews()">Tambah</button>

<h3>Upload Profile</h3>
<input id="targetUser" placeholder="Nama pertama">
<input type="file" id="profileImg">
<button onclick="uploadProfile()">Upload</button>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<script>
// 🔥 LETAK CONFIG KAMU SINI
const firebaseConfig = {
  apiKey: "AIzaSyAXiaLnU_GIaqOJqdY4IORIHt9KtWIpjzI",
  authDomain: "idpspoa.firebaseapp.com",
  projectId: "idpspoa",
  storageBucket: "idpspoa.firebasestorage.app",
  messagingSenderId: "432913020181",
  appId: "1:432913020181:web:4f074081f4744d86fc651c",
  measurementId: "G-TZC6TYDJEW"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser=null;

// LOGIN
async function login(){
let u=username.value.toUpperCase();
let p=password.value;

// ADMIN
if(u==="ADMINSPOA2327" && p==="SPOACEMERLANG2327"){
adminBtn.classList.remove("hidden");
openMain();
home.innerHTML="<h2>Admin Mode</h2>";
loadNews();
return;
}

// USER
let snap=await db.collection("users").get();
snap.forEach(doc=>{
let d=doc.data();
if(d.first===u && d.ic===p){
currentUser=d;
openMain();
renderProfile(d);
}
});
}

function openMain(){
loginPage.classList.add("hidden");
mainPage.classList.remove("hidden");
}

// PROFILE
function renderProfile(d){
home.innerHTML=`
<img src="${d.img||''}" class="profile-img">
<h2>${d.name}</h2>
<p>IC: ${d.ic}</p>
<p>Kelas: ${d.kelas}</p>
`;
}

// NEWS
async function addNews(){
let file=newsImg.files[0];
let ref=storage.ref("news/"+file.name);
await ref.put(file);
let url=await ref.getDownloadURL();

await db.collection("news").add({
text:newsText.value,
img:url
});
alert("Berjaya");
}

async function loadNews(){
let snap=await db.collection("news").get();
newsList.innerHTML="";
snap.forEach(doc=>{
let n=doc.data();
newsList.innerHTML+=`
<div class="card">
<p>${n.text}</p>
<img src="${n.img}" style="width:100%">
</div>`;
});
}

// PROFILE UPLOAD
async function uploadProfile(){
let name=targetUser.value.toUpperCase();
let file=profileImg.files[0];

let ref=storage.ref("profile/"+file.name);
await ref.put(file);
let url=await ref.getDownloadURL();

let snap=await db.collection("users").get();
snap.forEach(async doc=>{
let d=doc.data();
if(d.first===name){
await db.collection("users").doc(doc.id).update({img:url});
alert("Updated!");
}
});
}

// NAV
function show(id){
document.querySelectorAll(".card").forEach(x=>x.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
if(id==="news") loadNews();
}

// LOGOUT
function logout(){
location.reload();
}
</script>

</body>
</html>
