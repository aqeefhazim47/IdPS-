<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Pengurusan Identiti Pegawai SPOA</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    background:#ffffff;
}

/* HEADER */
header {
    background:#392f48;
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
    gap:10px;
    border-bottom:4px solid #c3a244;
}

header img {
    height:40px;
}

header h1 {
    font-size:18px;
    margin:0;
}

/* LOGIN */
.login-box {
    max-width:350px;
    margin:60px auto;
    text-align:center;
}

.login-box img {
    width:90px;
    margin-bottom:10px;
}

.login-box h2 {
    color:#392f48;
}

.card {
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

input, textarea {
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:12px;
    background:#392f48;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    background:#2a2236;
}

/* MAIN */
.container {
    padding:20px;
}

.nav {
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.nav button {
    flex:1;
}

.hidden {display:none;}

.news-img {
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

/* GOLD LINE */
.section {
    border-top:3px solid #c3a244;
    padding-top:10px;
}
</style>
</head>

<body>

<header>
<img src="logospoa.png">
<h1>SISTEM PENGURUSAN IDENTITI SPOA</h1>
</header>

<!-- LOGIN -->
<div id="loginPage" class="login-box">

<img src="logo.png">

<div class="card">
<h2>Selamat Datang</h2>

<input id="username" placeholder="Username">
<input id="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>
</div>

<!-- MAIN -->
<div id="mainPage" class="container hidden">

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('news')">News</button>
<button id="adminBtn" class="hidden" onclick="show('admin')">Admin</button>
</div>

<div id="home" class="card section"></div>

<div id="news" class="card section hidden">
<h2>Pengumuman</h2>
<div id="newsList"></div>
</div>

<div id="admin" class="card section hidden">
<h2>Admin Panel</h2>

<textarea id="newsText" placeholder="Tulis pengumuman"></textarea>
<input id="imgUrl" placeholder="Link gambar (optional)">
<button onclick="addNews()">Tambah News</button>

<hr>

<h3>Senarai Pengguna</h3>
<div id="userList"></div>

</div>

</div>

<script>
let users=[];
let news=[];

// LOAD JSON
fetch("SPISPOA.json")
.then(r=>r.json())
.then(data=>{
users=data.map(x=>{
return {
name:x.NAMA,
first:x.NAMA.split(" ")[0].toUpperCase(),
ic:(x["KAD PENGENALAN"]+"").replace(/[^0-9]/g,'')
}
});
});

// LOGIN
function login(){
let u=document.getElementById("username").value.toUpperCase();
let p=document.getElementById("password").value;

// ADMIN
if(u==="ADMINSPOA2327" && p==="SPOACEMERLANG2327"){
document.getElementById("adminBtn").classList.remove("hidden");
openMain();
document.getElementById("home").innerHTML="<h2>Selamat datang Admin</h2>";
renderUsers();
return;
}

// USER
let found=users.find(x=>x.first===u && x.ic===p);
if(found){
openMain();
document.getElementById("home").innerHTML=`<h2>${found.name}</h2>`;
}else{
alert("Login gagal");
}
}

function openMain(){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("mainPage").classList.remove("hidden");
}

// NAV
function show(id){
document.querySelectorAll(".section").forEach(x=>x.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");

if(id==="news") renderNews();
}

// NEWS
function addNews(){
let text=document.getElementById("newsText").value;
let img=document.getElementById("imgUrl").value;

news.push({text, img});
renderNews();
}

function renderNews(){
let box=document.getElementById("newsList");
box.innerHTML=news.map(n=>`
<div class="card">
<p>${n.text}</p>
${n.img ? `<img src="${n.img}" class="news-img">` : ""}
</div>
`).join("");
}

// USER LIST
function renderUsers(){
let box=document.getElementById("userList");
box.innerHTML=users.map(u=>`<p>${u.name}</p>`).join("");
}
</script>

</body>
</html>
