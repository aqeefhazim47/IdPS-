<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Pengurusan Identiti Pegawai SPOA</title>

<style>
body {font-family:'Segoe UI';margin:0;background:#fff;}

header {
background:#392f48;color:white;padding:15px;
display:flex;align-items:center;gap:10px;
border-bottom:4px solid #c3a244;
}
header img{height:40px;}
header h1{font-size:16px;margin:0;}

.login-box{max-width:350px;margin:40px auto;text-align:center;}
.login-box img{width:90px;}

.card{
background:white;padding:20px;border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
margin-top:10px;
transition:0.3s;
}

input,textarea{
width:100%;padding:12px;margin:8px 0;
border-radius:8px;border:1px solid #ccc;
}

button{
padding:12px;background:#392f48;color:white;
border:none;border-radius:8px;font-weight:bold;
width:100%;
transition:0.3s;
}

/* 🔥 MENU IMPROVEMENT */
#menuBox {
padding:15px;
border-radius:20px;
background:#f8fafc;
}

#menuBox button {
margin:8px 0;
padding:14px;
border-radius:12px;
font-size:15px;
}

#menuBox button:hover {
background:#2c2438;
transform: translateY(-2px);
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.hidden{display:none;}
.section{border-top:3px solid #c3a244;padding-top:10px;}

.data-row{padding:6px;border-bottom:1px solid #eee;}
.news-img{width:100%;border-radius:10px;margin-top:10px;}

@keyframes fade {
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}
.section{animation:fade 0.4s ease;}
</style>
</head>

<body>

<header>
<img src="logospoa.png">
<h1>SISTEM PENGURUSAN IDENTITI PEGAWAI SPOA</h1>
</header>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
<img src="logospoa.png">

<div class="card">
<h2>Selamat Datang ke IdPSPOA. Sila Log Masuk</h2>
<input id="username" placeholder="Username">
<input id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="card">
<h3>Pengumuman</h3>
<div id="loginNewsList"></div>
</div>

</div>

<!-- MAIN -->
<div id="mainPage" class="hidden" style="padding:20px;">

<button onclick="toggleMenu()">☰ Menu</button>

<div id="menuBox" class="card hidden">
<button onclick="show('home')">Home</button>
<button onclick="show('news')">News</button>
<button onclick="show('upload')">Hantar Kerja</button>
<button id="adminBtn" class="hidden" onclick="show('admin')">Admin</button>
<button onclick="logout()">Logout</button>
</div>

<div id="home" class="card section"></div>

<div id="news" class="card section hidden">
<h2>Pengumuman</h2>
<div id="newsList"></div>
</div>

<!-- HANTAR KERJA -->
<div id="upload" class="card section hidden">
<h2>Hantar Kerja</h2>
<input id="namaPelajar" placeholder="Nama">
<input id="linkKerja" placeholder="Link kerja (Google Drive dll)">
<button onclick="hantarKerja()">Hantar</button>
<p id="statusHantar"></p>
</div>

<!-- ADMIN -->
<div id="admin" class="card section hidden">
<h2>Admin Panel</h2>

<textarea id="newsText" placeholder="Tulis pengumuman"></textarea>
<input id="imgUrl" placeholder="Link gambar (optional)">
<button onclick="addNews()">Tambah News</button>

<hr>

<h3>Senarai Pengguna</h3>
<input id="searchUser" placeholder="Cari pengguna..." onkeyup="searchUser()">
<div id="userList"></div>

<hr>

<h3>Senarai Hantaran Kerja</h3>
<div id="submissionList"></div>

</div>

</div>

<script>
let users=[];
let news=JSON.parse(localStorage.getItem("news")||"[]");
let submissions=JSON.parse(localStorage.getItem("submissions")||"[]");
let idleTimer;

// LOAD JSON
fetch("SPISPOA.json")
.then(r=>r.json())
.then(data=>{
users=data.map(x=>{
return{
raw:x,
first:x.NAMA?.split(" ")[0]?.toUpperCase()||"",
ic:(x["KAD PENGENALAN"]+"").replace(/[^0-9]/g,'')
};
});
});

// LOGIN
function login(){
let u=username.value.toUpperCase();
let p=password.value;

if(u==="ADMINSPOA2327" && p==="SPOACEMERLANG2327"){
adminBtn.classList.remove("hidden");
openMain();
home.innerHTML="<h2>Selamat datang Admin</h2>";
renderUsers();
renderSubmission();
startIdle();
return;
}

let found=users.find(x=>x.first===u && x.ic===p);
if(found){
openMain();
renderData(found.raw);
startIdle();
}else{
alert("Login gagal");
}
}

function openMain(){
loginPage.classList.add("hidden");
mainPage.classList.remove("hidden");
}

// PAPAR DATA FULL JSON
function renderData(data){
let html="<h2>Maklumat Lengkap</h2>";
for(let k in data){
if(data[k]){
html+=`<div class='data-row'><b>${k}:</b> ${data[k]}</div>`;
}
}
home.innerHTML=html;
}

// MENU
function toggleMenu(){
menuBox.classList.toggle("hidden");
}

// NAV
function show(id){
document.querySelectorAll(".section").forEach(x=>x.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");

if(id==="news") renderNews();
if(id==="admin") renderSubmission();
}

// NEWS
function addNews(){
let t=newsText.value;
let i=imgUrl.value;

news.push({t,i});
localStorage.setItem("news",JSON.stringify(news));

newsText.value="";
imgUrl.value="";
renderNews();
}

function renderNews(){
newsList.innerHTML=news.map(n=>`
<div class="card">
<p>${n.t}</p>
${n.i?`<img src="${n.i}" class="news-img">`:""}
</div>`).join("");

loginNewsList.innerHTML=news.map(n=>`<p>• ${n.t}</p>`).join("");
}

// HANTAR KERJA
function hantarKerja(){
let nama=namaPelajar.value;
let link=linkKerja.value;

if(!nama || !link) return alert("Isi semua");

submissions.push({nama,link});
localStorage.setItem("submissions",JSON.stringify(submissions));

statusHantar.innerText="✅ Berjaya dihantar!";
namaPelajar.value="";
linkKerja.value="";
}

// ADMIN VIEW
function renderSubmission(){
submissionList.innerHTML=submissions.map(s=>`
<div class="card">
<p><b>${s.nama}</b></p>
<a href="${s.link}" target="_blank">${s.link}</a>
</div>
`).join("");
}

// USERS
function renderUsers(){
userList.innerHTML=users.map(u=>`<p>${u.raw.NAMA}</p>`).join("");
}

function searchUser(){
let q=searchUser.value.toLowerCase();
userList.innerHTML=users.filter(u=>u.raw.NAMA.toLowerCase().includes(q))
.map(u=>`<p>${u.raw.NAMA}</p>`).join("");
}

// LOGOUT
function logout(){
if(confirm("Logout?")){
location.reload();
}
}

// AUTO LOGOUT
function startIdle(){
clearTimeout(idleTimer);
document.onmousemove=resetTimer;
document.onkeypress=resetTimer;
resetTimer();
}

function resetTimer(){
clearTimeout(idleTimer);
idleTimer=setTimeout(()=>{
alert("Auto logout");
location.reload();
},300000);
}
</script>

</body>
</html>
